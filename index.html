<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مختبر YOU الأمني</title>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; padding: 50px; }
        textarea { width: 80%; background: #222; border: 1px solid #444; color: #0f0; padding: 10px; border-radius: 8px; }
        button { background: #f00; color: #fff; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; border-radius: 20px; }
        #wall { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <h2>ثغرة XSS - مشروع YOU 🛡️</h2>
    <textarea id="msg" rows="4" placeholder="احقن الكود هنا..."></textarea><br>
    <button onclick="post()">نشر التعليق</button>
    <div id="wall"></div>

    <script>
        // زرع الكوكيز اللي راح ينسرق
        document.cookie = "SessionID=YOU_TECH_2026; User=Admin_Youssef; path=/";

        function post() {
            let input = document.getElementById('msg').value;
            // الثغرة هنا: استخدام innerHTML يسمح بتنفيذ الأكواد
            document.getElementById('wall').innerHTML += "<div>" + input + "</div>";
            document.getElementById('msg').value = "";
        }
    </script>
</body>
</html>
